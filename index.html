<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>白桦小学：08:00 自动开馆 / v6</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="boot">
    <div class="boot-card">
      <div class="boot-title">白桦小学数字纪念馆</div>
      <div>线上展厅维护端 v6.0</div>
      <div class="boot-small">正在恢复公开展区、照片修复工具、馆藏索引、宣传科后台、校工室终端...</div>
    </div>
  </div>

  <main id="app" class="hidden">
    <aside id="sidebar">
      <div class="brand">
        <div class="brand-title">白桦小学</div>
        <div class="brand-sub">08:00 自动开馆</div>
      </div>

      <div class="status-box">
        <div>维护进度</div>
        <div id="progressText">1/31</div>
        <div class="progress-rail"><div id="progressBar"></div></div>
      </div>

      <div class="side-title">章节</div>
      <div id="chapterList"></div>

      <div class="side-title">已恢复档案</div>
      <div id="nodeList"></div>

      <button id="resetBtn">重置进度</button>
    </aside>

    <section id="mainPanel">
      <header id="topbar">
        <div>
          <div id="chapterLabel">第一章</div>
          <h1 id="pageTitle">开馆公告</h1>
        </div>
        <div id="clock">07:12</div>
      </header>

      <section id="contentCard">
        <div id="fileType"></div>
        <div id="bodyText"></div>
      </section>

      <section id="taskCard">
        <div class="task-title">系统提示</div>
        <div id="objective"></div>
        <div id="puzzle"></div>
      </section>

      <section id="clueCard">
        <div class="task-title">线索板</div>
        <div id="clues"></div>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
